<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scetlib-differentiable</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  body { margin: 0; font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
         color: #1f2328; background: #f6f8fa; }
  nav { position: sticky; top: 0; background: #24292f; padding: 0.5em 1em; }
  nav a { color: #c9d1d9; text-decoration: none; margin-right: 1.5em; font-size: 14px; }
  nav a.active, nav a:hover { color: #fff; font-weight: 600; }
  main { max-width: 900px; margin: 1.5em auto; padding: 2em 3em; background: #fff;
         border: 1px solid #d0d7de; border-radius: 6px; line-height: 1.6; }
  main h1, main h2 { border-bottom: 1px solid #d8dee4; padding-bottom: 0.3em; }
  main pre { background: #f6f8fa; padding: 1em; overflow-x: auto; border-radius: 6px; font-size: 85%; }
  main code { background: #f0f1f3; padding: 0.15em 0.35em; border-radius: 4px; font-size: 90%; }
  main pre code { background: none; padding: 0; }
  main table { border-collapse: collapse; display: block; overflow-x: auto; }
  main th, main td { border: 1px solid #d0d7de; padding: 5px 12px; }
  main tr:nth-child(2n) { background: #f6f8fa; }
  main blockquote { color: #57606a; border-left: 4px solid #d0d7de; margin-left: 0; padding-left: 1em; }
  #err { color: #a40e26; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main id="content"><p>loading…</p></main>
<script>
const DOCS = ["PROPOSAL.md", "ARCHITECTURE.md"];
const current = new URLSearchParams(location.search).get("f") || DOCS[0];
document.getElementById("nav").innerHTML = DOCS.map(d =>
  `<a href="?f=${d}" class="${d === current ? "active" : ""}">${d.replace(".md","")}</a>`
).join("");
fetch(current, {cache: "no-store"})
  .then(r => { if (!r.ok) throw new Error(r.status + " " + r.statusText); return r.text(); })
  .then(md => {
    // strip YAML frontmatter if present
    md = md.replace(/^---\n[\s\S]*?\n---\n/, "");
    document.getElementById("content").innerHTML = marked.parse(md);
    document.title = current.replace(".md", "") + " — scetlib-differentiable";
  })
  .catch(e => {
    document.getElementById("content").innerHTML =
      `<p id="err">Could not load <code>${current}</code>: ${e.message}</p>`;
  });
</script>
</body>
</html>
