#-------------------------------------------------------------------------------
# qT: union of bin edges + bin centres of the 70-bin experimental grid
# (71 + 70 = 141 unique points). Allows 3-point Simpson per qT bin on the
# Python side (4th-order accurate per bin) → expected shape residual <0.05 %.
