[Calculation_settings]
fixed_order = nnlo
run_order = n3ll
muf_min = 1.40
variations_filename = variations_btgrid.conf

[Electroweak]
alphaem = 0.0077624494296896114
sin2_thw = 0.23153999447822571
mZ = 91.153509740726733 # GeV
GammaZ = 2.4932018986110700 # GeV
mW = 79.906853549493746 # GeV
GammaW = 2.0904310808144846 # GeV
ckm = [ [0.97446, 0.222, 0.00365], [0.22438, 0.97359, 0.04214], [0.00896, 0.04133, 0.999105] ]

[Process]
boson = Z

#-------------------------------------------------------------------------------
# Nonperturbative: in --bt-grid mode, bt_grid.force_np_off() zeroes ALL NP lambdas
# (eff + gamma_nu), so the lambda* values are irrelevant in the stored grid. BUT
# force_np_off KEEPS b0_over_bmax_nu and np_model_nu, because b0_over_bmax_nu sets
# the b* prescription used INSIDE the *perturbative* gamma_nu evolution
# (Gamma_nu.cpp:102-103: bstar=bStar(bT); Lb=2*log(mu0*bstar)). It MUST match the
# FranksVals tune (b0_over_bmax_nu = 1.), NOT the defaults.conf fallback (= 0.).
# The original btgrid_fineall card had NO [Nonperturbative] section, so it silently
# inherited b0_over_bmax_nu = 0 -> wrong perturbative gamma_nu kernel -> the low-qT
# (~0.8%) / NP-off (~2%) wiggle vs the FranksVals reference. See
# scetlib_run/BTGRID_PRECISION_LOGBOOK.md (2026-06-24, "ROOT CAUSE FOUND").
#-------------------------------------------------------------------------------
[Nonperturbative]
b0_over_bmax_nu = 1.
np_model_nu = tanh_2

#-------------------------------------------------------------------------------
# Q: 24 points densely sampling the Z resonance (same as btgrid_qfine).
#-------------------------------------------------------------------------------
[Grid_Q]
custom_grid=true
bins = false
values = [60.0, 65.0, 70.0, 75.0, 80.0, 84.0, 86.0, 88.0, 89.0, 90.0, 90.5, 91.0, 91.5, 92.0, 92.5, 93.0, 94.0, 96.0, 98.0, 102.0, 106.0, 110.0, 115.0, 120.0]

